<!DOCTYPE html>
<html>
<head>
    <title>Vimala College Party Registration</title>
    <link rel="stylesheet" href="/css/bootstrap.css" href="/style.css">
</head>
<link rel="stylesheet" "href="external.css">
<body>
    <h2>Vimala College Party Registration Form</h2>
<form>
        Full Name:<br>
        <input type="text" name="name" required><br><br>
        
        Email:<br>
        <input type="email" name="email" required><br><br>
       
        Phone Number:<br>
        <input type="tel" name="phone" pattern="[0-9]{10}" placeholder="10-digit number" required><br><br>
        
        Department:<br>
        <input type="text" name="dept" required><br><br>

        Year of Study:<br>
        <input type="number" name="year" min="1" max="3" required><br><br>

        Party Date:<br>
        <input type="date" name="date" required><br><br>
        
        Party Time:<br>
        <input type="time" name="time"><br><br>

        Number of Members:<br>
        <input type="number" name="members" min="1" required><br><br>
        
        Special Requests:<br>
        <textarea name="msg" rows="3"></textarea><br><br>

       
        <input type="submit" value="Register">
</form>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="/js/bootstrap.js"></script>
</body>
</html>
