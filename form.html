<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form1.css">
</head>
<body align="center">
    <form>
    <h3 class="mb-4">Rgistration Form</h3>
    <label for="username" class="form-label">Name:</label>
<input type="text" class="form-control" id="username" placeholder="Enter your name"><br><br>
<label for="email" class="form-label">Email:</label>
<input type="email" class="form-control" id="email" placeholder="Enter your email"><br><br>
<label for="password" class="form-label">Password:</label>
<input type="password" class="form-control" id="password" placeholder="Enter your password"><br><br>

<div class="mb-3">
  <label class="form-label">Phone Number</label>
  <input type="tel" class="form-control" placeholder="Enter phone number">
</div>
<br>
<div class="mb-3">
 <label class="form-label">Website URL</label>
  <input type="url" class="form-control" placeholder="https://example.com">
</div>
<br>
<label for="gender">Gender:</label>
<select id="gender" name="gender" required>
<option value="">Select...</option>
<option value="male">Male</option>
<option value="female">Female</option>
<option value="other">Other</option>
</select><br><br>
<label for="bio">Short Bio:</label><br>
<textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself"></textarea><br><br>

<div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="exampleCheck">
      <label class="form-check-label" for="exampleCheck">
        Accept Terms & Conditions
</div>

<button type="submit">Register</button>
<br><br>
</form>
</body>
</html>
